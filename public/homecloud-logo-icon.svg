<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" />
      <stop offset="100%" stop-color="#4C1D95" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4C1D95" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Fond : carré arrondi dégradé -->
  <rect x="4" y="4" width="248" height="248" rx="56" fill="url(#bg-gradient)" filter="url(#soft-shadow)" />

  <!-- Icône "layers" (Feather Icons, MIT license) recentrée et mise à l'échelle -->
  <g transform="translate(64,64) scale(5.5)" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2" />
    <polyline points="2 17 12 22 22 17" />
    <polyline points="2 12 12 17 22 12" />
  </g>
</svg>
